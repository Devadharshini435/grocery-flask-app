<!DOCTYPE html>
<html>
<head>
    <title>Cart Checkout</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .checkout-card { border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .price { color: #dc3545; font-weight: bold; }
    </style>
</head>
<body>

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-7">

            <div class="card checkout-card p-4">
                <h3 class="mb-4 text-center">🛒 Cart Checkout</h3>

                <ul class="list-group mb-3">
                    {% for item in cart_items %}
                    <li class="list-group-item d-flex justify-content-between align-items-center">
                        <div>
                            <strong>{{ item.product_name }}</strong><br>
                            <small class="text-muted">Qty: {{ item.quantity }}</small>
                        </div>
                        <span>₹{{ item.price * item.quantity }}</span>
                    </li>
                    {% endfor %}
                    <li class="list-group-item d-flex justify-content-between">
                        <strong>Total</strong>
                        <strong class="price">₹{{ total_price }}</strong>
                    </li>
                </ul>

                <div class="d-grid gap-2 mt-3">
                    <!-- Proceed to Address Page -->
                    <form action="{{ url_for('address') }}" method="POST">
                        <button type="submit" class="btn btn-success btn-lg">Continue to Address</button>
                    </form>

                    <a href="{{ url_for('cart') }}" class="btn btn-outline-secondary">
                        Continue Shopping
                    </a>
                </div>

            </div>

        </div>
    </div>
</div>

</body>
</html>
