<!DOCTYPE html>
<html>
<head>
    <title>Delivery Address</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">

            <div class="card p-4 shadow">
                <h4 class="mb-3">📍 Delivery Address</h4>

                <form method="POST">
    <div class="mb-3">
        <label>Name</label>
        <input type="text" name="name" class="form-control" required
               value="{{ address['name'] if address else '' }}">
    </div>

    <div class="mb-3">
        <label>Phone</label>
        <input type="text" name="phone" class="form-control" required
               value="{{ address['phone'] if address else '' }}">
    </div>

    <div class="mb-3">
        <label>Address</label>
        <textarea name="address" class="form-control" required>{{ address['address'] if address else '' }}</textarea>
    </div>

    <div class="mb-3">
        <label>City</label>
        <input type="text" name="city" class="form-control" required
               value="{{ address['city'] if address else '' }}">
    </div>

    <div class="mb-3">
        <label>Pincode</label>
        <input type="text" name="pincode" class="form-control" required
               value="{{ address['pincode'] if address else '' }}">
    </div>

    <button type="submit" class="btn btn-success w-100">Continue to Payment</button>
</form>


            </div>

        </div>
    </div>
</div>

</body>
</html>
