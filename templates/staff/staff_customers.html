<!DOCTYPE html>
<html>
<head>

<title>Customers</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
display:flex;
margin:0;
}

/* Sidebar */

.sidebar{
width:220px;
height:100vh;
background:#343a40;
padding:20px;
position:fixed;
}

.sidebar a{
display:block;
color:white;
padding:10px;
text-decoration:none;
margin-bottom:5px;
}

.sidebar a:hover{
background:#495057;
border-radius:5px;
}

.content{
margin-left:240px;
padding:30px;
width:100%;
}

</style>

</head>

<body>

<!-- Sidebar -->

<div class="sidebar">

<h4 class="text-white text-center">Staff Panel</h4>
<hr class="text-white">

<a href="{{ url_for('staff.dashboard') }}">Dashboard</a>
<a href="{{ url_for('staff.orders') }}">Orders</a>
<a href="{{ url_for('staff.products') }}">Products</a>
<a href="{{ url_for('staff.suppliers') }}">Suppliers</a>
<a href="{{ url_for('staff.customers') }}">Customers</a>
<a href="#">Logout</a>

</div>


<!-- Content -->

<div class="content">

<h2>Customers List</h2>

<table class="table table-bordered table-hover mt-3">

<thead class="table-dark">
<tr>
<th>Customer ID</th>
<th>Customer Name</th>
<th>Email</th>
<th>Total Orders</th>
<th>Coins</th>
</tr>
</thead>

<tbody>

{% for c in customer %}

<tr>
<td>{{ c.customer_id }}</td>
<td>{{ c.customer_name }}</td>
<td>{{ c.customer_email }}</td>
<td>{{ c.total_orders }}</td>
<td>{{ c.reward_points }}</td>
</tr>

{% endfor %}

</tbody>

</table>

</div>

</body>
</html>
