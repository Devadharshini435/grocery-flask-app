<!DOCTYPE html>
<html>
<head>

<title>Add Supplier</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
display:flex;
margin:0;
background:#f8f9fa;
}

/* Sidebar */

.sidebar{
width:220px;
height:100vh;
background:#343a40;
padding:20px;
position:fixed;
}

.sidebar a{
display:block;
color:white;
padding:10px;
text-decoration:none;
margin-bottom:5px;
}

.sidebar a:hover{
background:#495057;
border-radius:5px;
}

.content{
margin-left:240px;
padding:30px;
width:100%;
}

.card{
border-radius:10px;
}

</style>

</head>

<body>

<!-- Sidebar -->

<div class="sidebar">

<h4 class="text-white text-center">Staff Panel</h4>
<hr class="text-white">

<a href="{{ url_for('staff.dashboard') }}">Dashboard</a>
<a href="{{ url_for('staff.orders') }}">Orders</a>
<a href="{{ url_for('staff.products') }}">Products</a>
<a href="{{ url_for('staff.suppliers') }}">Suppliers</a>
<a href="{{ url_for('staff.customers') }}">Customers</a>
<a href="{{ url_for('staff.staff_logout') }}">Logout</a>

</div>


<!-- Content -->

<div class="content">

<h2 class="mb-4">Add Supplier</h2>

<div class="card shadow p-4" style="max-width:600px;">

<form method="POST">

<div class="mb-3">
<label class="form-label">Supplier Name</label>
<input type="text" name="supplier_name" class="form-control" placeholder="Enter supplier name" required>
</div>

<div class="mb-3">
<label class="form-label">Product</label>

<select name="product_id" class="form-select" required>

<option value="">Select Product</option>

{% for p in products %}
<option value="{{ p.product_id }}">{{ p.product_name }}</option>
{% endfor %}

</select>

</div>

<div class="mb-3">
<label class="form-label">Phone</label>
<input type="text" name="phone" class="form-control" placeholder="Enter phone number">
</div>

<div class="mb-3">
<label class="form-label">Email</label>
<input type="email" name="email" class="form-control" placeholder="Enter email">
</div>

<div class="mb-3">
<label class="form-label">Address</label>
<textarea name="address" class="form-control" rows="3" placeholder="Enter address"></textarea>
</div>

<div class="d-flex gap-2">

<button type="submit" class="btn btn-success">
Add Supplier
</button>

<a href="{{ url_for('staff.suppliers') }}" class="btn btn-secondary">
Cancel
</a>

</div>

</form>

</div>

</div>

</body>
</html>
