<!DOCTYPE html>
<html>
<head>

<title>Add Product</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f5f6fa;
}

.card{
border:none;
border-radius:12px;
}

.image-box{
width:220px;
height:220px;
border:2px dashed #bbb;
border-radius:12px;
background:#f1f1f1;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
margin:auto;
position:relative;
}

.image-box:hover{
background:#e9ecef;
}

.image-box img{
width:100%;
height:100%;
object-fit:cover;
display:none;
border-radius:10px;
}

.plus{
font-size:50px;
color:#888;
}

input[type=file]{
display:none;
}

</style>

</head>

<body>

<div class="container mt-5">

<div class="card shadow">

<div class="card-header bg-dark text-white">
<h4 class="mb-0">➕ Add New Product</h4>
</div>

<div class="card-body">

<form method="POST" enctype="multipart/form-data">

<div class="row">

<!-- IMAGE -->

<div class="col-md-4 text-center">

<label class="fw-bold mb-2">Product Image</label>

<div class="image-box" id="uploadBox">

<span class="plus" id="plus">+</span>

<img id="preview">

</div>

<input type="file" name="image" id="imageInput" required>

</div>


<!-- DETAILS -->

<div class="col-md-8">

<div class="row">

<div class="col-md-6 mb-3">
<label>Category</label>
<input type="text" name="category" class="form-control" required>
</div>

<div class="col-md-6 mb-3">
<label>Product Name</label>
<input type="text" name="product_name" class="form-control" required>
</div>

</div>

<div class="mb-3">
<label>Dish Name (Optional)</label>
<input type="text" name="dish_name" class="form-control">
</div>

<div class="mb-3">
<label>Description</label>
<textarea name="description" class="form-control" rows="3" required></textarea>
</div>

<div class="row">

<div class="col-md-6 mb-3">
<label>Price (₹)</label>
<input type="number" step="0.01" name="price" class="form-control" required>
</div>

<div class="col-md-6 mb-3">
<label>Stock</label>
<input type="number" name="stock" class="form-control" required>
</div>

</div>

<div class="text-end">

<button class="btn btn-success px-4">
Save Product
</button>

<a href="{{ url_for('staff.products') }}" class="btn btn-secondary ms-2">
Cancel
</a>

</div>

</div>

</div>

</form>

</div>

</div>

</div>

<script>

const uploadBox = document.getElementById("uploadBox")
const input = document.getElementById("imageInput")
const preview = document.getElementById("preview")
const plus = document.getElementById("plus")

uploadBox.onclick = () => input.click()

input.onchange = () => {

const file = input.files[0]

preview.src = URL.createObjectURL(file)
preview.style.display="block"
plus.style.display="none"

}

</script>

</body>
</html>
