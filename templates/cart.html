<!DOCTYPE html>
<html>
<head>
    <title>Cart</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

{% include 'navbar.html' %}

<div class="container mt-5">

    <h2 class="mb-4 text-center">Your Cart</h2>
{% if cart_items %}

<div class="row">

    <!-- LEFT SIDE — CART ITEMS -->
    <div class="col-lg-8">
{% for item in cart_items %}
<div class="card cart-card mb-3 p-3">
    
    <div class="d-flex align-items-center justify-content-between flex-wrap">

        <!-- LEFT SIDE (Image + Name) -->
        <div class="d-flex align-items-center cart-left">

            <img src="{{ url_for('static', filename='uploads/' + item['image']) }}"
                 class="cart-img me-3">

            <div>
                <h6 class="mb-1">{{ item['product_name'] }}</h6>
                <small class="text-muted">₹{{ item['price'] }}</small>
            </div>

        </div>

        <!-- MIDDLE (Quantity) -->
        <div class="qty-stepper mt-2 mt-md-0">

            <a href="{{ url_for('decrease_quantity', cart_id=item['cart_id']) }}"
               class="qty-btn">−</a>

            <span class="qty-number">{{ item['quantity'] }}</span>

            <a href="{{ url_for('increase_quantity', cart_id=item['cart_id']) }}"
               class="qty-btn">+</a>

        </div>

        <!-- RIGHT SIDE (Total + Remove) -->
        <div class="text-end mt-2 mt-md-0">

            <div class="fw-bold mb-1">
                ₹{{ item['total'] }}
            </div>

            <form method="POST"
                  action="{{ url_for('remove_cart', cart_id=item['cart_id']) }}">
                <button class="btn btn-sm btn-outline-danger">
                    Remove
                </button>
            </form>

        </div>

    </div>

</div>
{% endfor %}

    </div>

    <!-- RIGHT SIDE — SUMMARY -->
    <div class="col-lg-4">
        <div class="card p-4 shadow-sm summary-box">

            <h5 class="fw-bold mb-3">Order Summary</h5>

            <div class="d-flex justify-content-between mb-2">
                <span>Total</span>
                <span>₹{{ grand_total }}</span>
            </div>

            <form action="{{ url_for('place_order') }}" method="GET">
                <button class="btn btn-success w-100 mt-3 btn-lg">
                    Place Order
                </button>
            </form>

        </div>
    </div>

</div>


{% else %}
<!-- Empty Cart Section -->
<div class="d-flex flex-column justify-content-center align-items-center" style="height: 60vh;">
    <img src="{{ url_for('static', filename='uploads/empty_cart.jpg') }}" 
         alt="Empty Cart" 
         style="width: 150px; margin-bottom: 20px;">
    <h3 class="text-muted mb-3">Your cart is empty!</h3>
    <a href="{{ url_for('home') }}" class="btn btn-primary">Shop Now</a>
</div>
{% endif %}

</div>

</body>
</html>
