<!DOCTYPE html>
<html>
<head>
    <title>Product Detail</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

{% include 'navbar.html' %}

<div class="container mt-5">
    <div class="row">

        <!-- IMAGE -->
        <div class="col-md-5">
            <img src="{{ url_for('static', filename='uploads/' + product['image']) }}"
                 class="img-fluid rounded border">
        </div>

        <!-- DETAILS -->
        <div class="col-md-7">

            <!-- DESCRIPTION -->
            <p class="text-muted">
                {{ product['description'] }}
            </p>

            <!-- STOCK -->
            <p>
                <strong>Stock:</strong>
                {% if product['stock'] and product['stock'] > 0 %}
                    <span class="text-success">Available</span>
                {% else %}
                    <span class="text-danger">Out of Stock</span>
                {% endif %}
            </p>

            <!-- FORM -->
            <form method="POST">

                <!-- UNIT PRICE (HIDDEN) -->
                <input type="hidden" id="unitPrice" value="{{ product['price'] }}">

                <!-- QUANTITY -->
                <div class="mb-3">
                    <label><strong>Quantity</strong></label>
                    <input type="number"
                           id="quantity"
                           name="quantity"
                           value="1"
                           min="1"
                           class="form-control w-25"
                           onchange="updatePrice()"
                           onkeyup="updatePrice()">
                </div>

                <!-- TOTAL PRICE -->
                <h4 class="text-danger mb-3">
                    Total Price: ₹<span id="totalPrice">{{ product['price'] }}</span>
                </h4>

                <!-- BUTTONS SAME LINE -->
             <button type="submit" name="action" value="add_to_cart" class="btn btn-success" 
        {% if product['stock'] == 0 %} disabled {% endif %}>
    Add to Cart
</button>

<button type="submit" name="action" value="buy" class="btn btn-primary"
        {% if product['stock'] == 0 %} disabled {% endif %}>
    Buy Now
</button>

                </div>

            </form>

        </div>
    </div>
</div>

<!-- JAVASCRIPT -->
<script>
function updatePrice() {
    const quantity = parseInt(document.getElementById("quantity").value) || 1;
    const unitPrice = parseFloat(document.getElementById("unitPrice").value);
    document.getElementById("totalPrice").innerText = (quantity * unitPrice).toFixed(2);
}
</script>

</body>
</html>
