<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Forgot Password</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --emerald: #059669;
            --emerald-light: #10b981;
            --emerald-pale: #d1fae5;
            --charcoal: #111827;
            --slate: #374151;
            --muted: #6b7280;
            --border: #e5e7eb;
            --radius: 16px;
            --radius-sm: 8px;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
        }

        /* Background */
        .bg-image {
            background-image: url('/static/images/bg2.jpg');
            background-size: cover;
            background-position: center;
            filter: blur(8px) brightness(0.7);
            position: fixed;
            inset: -20px;
            z-index: -1;
        }

        /* Center layout */
        .page-wrapper {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Card */
        .forgot-card {
            width: 100%;
            max-width: 420px;
            background: rgba(255,255,255,0.92);
            backdrop-filter: blur(15px);
            border-radius: var(--radius);
            box-shadow: 0 20px 50px rgba(0,0,0,0.25);
            overflow: hidden;
            animation: slideUp 0.4s ease;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(25px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Top strip */
        .card-strip {
            background: linear-gradient(135deg, var(--emerald-light), var(--emerald));
            padding: 25px;
            text-align: center;
            color: white;
        }

        .card-strip i {
            font-size: 24px;
            margin-bottom: 10px;
        }

        .card-strip h3 {
            margin: 0;
            font-weight: 700;
        }

        /* Body */
        .card-body {
            padding: 30px;
        }

        /* Input */
        .form-group {
            margin-bottom: 18px;
        }

        .form-label {
            font-size: 12px;
            font-weight: 600;
            color: var(--slate);
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            top: 50%;
            left: 12px;
            transform: translateY(-50%);
            color: var(--muted);
        }

        .form-control {
            padding-left: 35px;
            border-radius: var(--radius-sm);
            border: 1.5px solid var(--border);
        }

        .form-control:focus {
            border-color: var(--emerald-light);
            box-shadow: 0 0 0 3px rgba(16,185,129,0.15);
        }

        /* Button */
        .btn-forgot {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: var(--radius-sm);
            background: linear-gradient(135deg, var(--emerald-light), var(--emerald));
            color: white;
            font-weight: 600;
            transition: 0.3s;
        }

        .btn-forgot:hover {
            background: linear-gradient(135deg, var(--emerald), #047857);
            transform: translateY(-2px);
        }

        /* Footer */
        .footer-text {
            text-align: center;
            margin-top: 15px;
            font-size: 13px;
            color: var(--muted);
        }

        .footer-text a {
            color: var(--emerald);
            font-weight: 600;
            text-decoration: none;
        }

        .footer-text a:hover {
            text-decoration: underline;
        }

        /* Alert */
        .alert {
            font-size: 13px;
            border-radius: var(--radius-sm);
        }

    </style>
</head>
<body>

<div class="bg-image"></div>

<div class="page-wrapper">

    <div class="forgot-card">

        <!-- Top -->
        <div class="card-strip">
            <i class="fas fa-key"></i>
            <h3>Forgot Password</h3>
            <p style="font-size:12px;">Enter your email to reset password</p>
        </div>

        <!-- Body -->
        <div class="card-body">

            {% if request.args.get('error') %}
            <div class="alert alert-danger text-center">
                {{ request.args.get('error') }}
            </div>
            {% endif %}

            <form action="/forgot-password" method="POST">

                <!-- Email -->
                <div class="form-group">
                    <label class="form-label">Email Address</label>
                    <div class="input-wrapper">
                        <i class="fas fa-envelope"></i>
                        <input type="email" name="email" class="form-control"
                               placeholder="Enter your email" required>
                    </div>
                </div>

                <button type="submit" class="btn-forgot">
                    <i class="fas fa-paper-plane"></i> Send Reset Code
                </button>

            </form>

            <div class="footer-text">
                Remember your password?
                <a href="/login">Login</a>
            </div>

        </div>

    </div>

</div>

</body>
</html>
