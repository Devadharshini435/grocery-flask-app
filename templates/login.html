<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --emerald: #059669;
            --emerald-light: #10b981;
            --emerald-pale: #d1fae5;
            --sapphire: #2563eb;
            --charcoal: #111827;
            --slate: #374151;
            --muted: #6b7280;
            --border: #e5e7eb;
            --white: #ffffff;
            --radius: 16px;
            --radius-sm: 8px;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body, html {
            height: 100%;
            font-family: 'DM Sans', sans-serif;
        }

        /* ── Blurred BG ── */
        .bg-image {
            background-image: url('/static/images/bg2.jpg');
            background-size: cover;
            background-position: center;
            filter: blur(8px) brightness(0.7);
            -webkit-filter: blur(8px) brightness(0.7);
            position: fixed;
            inset: -20px;
            z-index: -1;
        }

        /* ── Full-height centering ── */
        .page-wrapper {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px 16px;
        }

        /* ── Card ── */
        .login-card {
            width: 100%;
            max-width: 440px;
            background: rgba(255,255,255,0.92);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: var(--radius);
            box-shadow: 0 20px 60px rgba(0,0,0,0.25);
            overflow: hidden;
            animation: slideUp 0.5s cubic-bezier(0.16,1,0.3,1) both;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(28px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* ── Card Top Strip ── */
        .card-strip {
            background: linear-gradient(135deg, var(--emerald-light), var(--emerald));
            padding: 28px 32px 24px;
            text-align: center;
        }
        .brand-icon {
            width: 52px; height: 52px;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 12px;
            font-size: 22px;
            color: white;
        }
        .card-title {
            font-family: 'Playfair Display', serif;
            font-size: 26px;
            font-weight: 700;
            color: white;
            margin-bottom: 4px;
        }
        .card-subtitle {
            font-size: 13px;
            color: rgba(255,255,255,0.8);
            font-weight: 300;
        }

        /* ── Card Body ── */
        .card-body-inner {
            padding: 28px 32px 32px;
        }

        /* ── Flash Messages ── */
        .alert-custom {
            border-radius: var(--radius-sm);
            padding: 10px 14px;
            font-size: 13px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 20px;
        }
        .alert-error   { background: #fef2f2; color: #991b1b; border: 1px solid #fecaca; }
        .alert-success { background: #f0fdf4; color: #065f46; border: 1px solid #bbf7d0; }

        /* ── Form Fields ── */
        .field-group { margin-bottom: 18px; }
        .field-label {
            display: block;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.7px;
            text-transform: uppercase;
            color: var(--slate);
            margin-bottom: 7px;
        }
        .field-wrapper {
            position: relative;
        }
        .field-icon {
            position: absolute;
            left: 13px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--muted);
            font-size: 14px;
            pointer-events: none;
        }
        .field-input {
            width: 100%;
            padding: 11px 40px 11px 38px;
            border: 1.5px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 14px;
            font-family: 'DM Sans', sans-serif;
            color: var(--charcoal);
            background: white;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .field-input:focus {
            border-color: var(--emerald-light);
            box-shadow: 0 0 0 3px rgba(16,185,129,0.12);
        }
        .field-input::placeholder { color: #b0b7c3; }

        /* Toggle password visibility */
        .toggle-pw {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--muted);
            cursor: pointer;
            padding: 2px 4px;
            font-size: 14px;
            transition: color 0.2s;
        }
        .toggle-pw:hover { color: var(--emerald); }

        /* ── Remember / Forgot row ── */
        .options-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 22px;
            font-size: 13px;
        }
        .remember-label {
            display: flex;
            align-items: center;
            gap: 7px;
            color: var(--slate);
            cursor: pointer;
            user-select: none;
        }
        .remember-check {
            width: 15px; height: 15px;
            accent-color: var(--emerald);
            cursor: pointer;
        }
        .forgot-link {
            color: var(--sapphire);
            text-decoration: none;
            font-weight: 500;
        }
        .forgot-link:hover { text-decoration: underline; }

        /* ── Submit Button ── */
        .btn-login {
            width: 100%;
            padding: 13px;
            background: linear-gradient(135deg, var(--emerald-light), var(--emerald));
            color: white;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 0.6px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.25s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-family: 'DM Sans', sans-serif;
        }
        .btn-login:hover {
            background: linear-gradient(135deg, var(--emerald), #047857);
            box-shadow: 0 6px 20px rgba(5,150,105,0.35);
            transform: translateY(-2px);
        }
        .btn-login:active { transform: translateY(0); }

        /* ── Divider ── */
        .or-divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 22px 0;
            color: var(--muted);
            font-size: 12px;
            font-weight: 500;
            letter-spacing: 0.5px;
        }
        .or-divider::before,
        .or-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        /* ── Social Buttons ── */
        .social-row { display: flex; gap: 10px; margin-bottom: 22px; }
        .btn-social {
            flex: 1;
            padding: 10px 12px;
            border: 1.5px solid var(--border);
            border-radius: var(--radius-sm);
            background: white;
            font-size: 13px;
            font-weight: 600;
            color: var(--slate);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
            font-family: 'DM Sans', sans-serif;
        }
        .btn-social:hover {
            border-color: #aaa;
            background: var(--border);
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        .btn-social img { width: 17px; height: 17px; }

        /* ── Footer text ── */
        .footer-text {
            text-align: center;
            font-size: 13.5px;
            color: var(--muted);
        }
        .footer-text a {
            color: var(--emerald);
            font-weight: 600;
            text-decoration: none;
        }
        .footer-text a:hover { text-decoration: underline; }
    </style>
</head>
<body>

    <div class="bg-image"></div>

    <div class="page-wrapper">
        <div class="login-card">

            <!-- Top strip -->
            <div class="card-strip">
                <div class="brand-icon"><i class="fas fa-leaf"></i></div>
                <div class="card-title">Welcome Back</div>
                <div class="card-subtitle">Sign in to continue to your account</div>
            </div>

            <!-- Body -->
            <div class="card-body-inner">

                <!-- Flash message placeholder (Jinja) -->
                {% with messages = get_flashed_messages(with_categories=true) %}
                  {% if messages %}
                    {% for category, message in messages %}
                      <div class="alert-custom {% if category == 'error' %}alert-error{% else %}alert-success{% endif %}">
                        <i class="fas {% if category == 'error' %}fa-circle-exclamation{% else %}fa-circle-check{% endif %}"></i>
                        {{ message }}
                      </div>
                    {% endfor %}
                  {% endif %}
                {% endwith %}

                <form action="/login" method="POST" novalidate>

                    <!-- Email -->
                    <div class="field-group">
                        <label class="field-label" for="email">Email Address</label>
                        <div class="field-wrapper">
                            <i class="fas fa-envelope field-icon"></i>
                            <input type="email" class="field-input" id="email" name="email"
                                   placeholder="you@example.com" required autocomplete="email">
                        </div>
                    </div>

                    <!-- Password -->
                    <div class="field-group">
                        <label class="field-label" for="password">Password</label>
                        <div class="field-wrapper">
                            <i class="fas fa-lock field-icon"></i>
                            <input type="password" class="field-input" id="password" name="password"
                                   placeholder="Enter your password" required autocomplete="current-password">
                            <button type="button" class="toggle-pw" onclick="togglePw()" id="toggleBtn" aria-label="Toggle password">
                                <i class="fas fa-eye" id="pwIcon"></i>
                            </button>
                        </div>
                    </div>

                    <!-- Remember / Forgot -->
                    <div class="options-row">
                        <label class="remember-label">
                            <input type="checkbox" class="remember-check" name="remember"> Remember me
                        </label>
                        <a href="/forgot-password" class="forgot-link">Forgot password?</a>
                    </div>

                    <!-- Submit -->
                    <button type="submit" class="btn-login">
                        <i class="fas fa-right-to-bracket"></i> Sign In
                    </button>
                </form>

                <!-- Register link -->
                <p class="footer-text">
                    Don't have an account? <a href="/register">Create one free</a>
                </p>

            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function togglePw() {
            const input = document.getElementById('password');
            const icon  = document.getElementById('pwIcon');
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }
    </script>

</body>
</html>
