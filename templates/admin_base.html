<!DOCTYPE html>
<html>
<head>
    <title>Admin Panel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { overflow-x: hidden; }
        #sidebar { min-width: 200px; max-width: 200px; height: 100vh; background-color: #343a40; color: white; position: fixed; }
        #sidebar a { color: white; display: block; padding: 10px; text-decoration: none; }
        #sidebar a:hover { background-color: #495057; }
        #content { margin-left: 200px; padding: 20px; }
    </style>
</head>
<body>
    <!-- Sidebar -->
    <div id="sidebar">
        <h3 class="text-center py-3">Admin Panel</h3>
        <a href="{{ url_for('admin_dashboard') }}">Dashboard</a>
        <a href="{{ url_for('admin_orders') }}">Orders</a>
        <a href="{{ url_for('admin_products') }}">Products</a>
        <a href="{{ url_for('admin_add_product') }}">Add Product</a>
        <a href="{{ url_for('admin_users') }}">Users</a>
        <a href="{{ url_for('admin_logout') }}">Logout</a>
    </div>

    <!-- Main Content -->
    <div id="content">
        {% block content %}
        <!-- Page-specific content will appear here -->
        {% endblock %}
    </div>

</body>
</html>
